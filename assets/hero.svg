<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.45" stop-color="#111A33"/>
      <stop offset="1" stop-color="#0D1428"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#182341"/>
      <stop offset="1" stop-color="#0F1730"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#58E1FF"/>
      <stop offset="1" stop-color="#9BFFB0"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1220" cy="170" r="180" fill="#4AE3C8" fill-opacity="0.18" filter="url(#blur)"/>
  <circle cx="300" cy="760" r="240" fill="#59A9FF" fill-opacity="0.15" filter="url(#blur)"/>

  <rect x="70" y="70" width="1460" height="760" rx="36" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="120" width="640" height="620" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
    <rect x="120" y="160" width="580" height="44" rx="12" fill="rgba(255,255,255,0.05)"/>
    <circle cx="150" cy="182" r="6" fill="#FF6B6B"/>
    <circle cx="172" cy="182" r="6" fill="#FFD166"/>
    <circle cx="194" cy="182" r="6" fill="#4CD964"/>
    <text x="230" y="189" fill="#CFE2FF" font-family="Consolas, monospace" font-size="20">$ repopack . --for codex --budget 20k</text>

    <text x="126" y="255" fill="#F7FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">REPOPACK.md</text>
    <text x="126" y="295" fill="#91A7C6" font-family="Segoe UI, Arial, sans-serif" font-size="18">Smart repo context for AI coding agents</text>

    <text x="126" y="360" fill="#9BFFB0" font-family="Consolas, monospace" font-size="18">Project Summary</text>
    <text x="126" y="395" fill="#D9E6FF" font-family="Consolas, monospace" font-size="18">- Stack: nodejs, typescript</text>
    <text x="126" y="425" fill="#D9E6FF" font-family="Consolas, monospace" font-size="18">- Package manager: npm</text>
    <text x="126" y="455" fill="#D9E6FF" font-family="Consolas, monospace" font-size="18">- Run: npm run dev / build / test</text>

    <text x="126" y="520" fill="#58E1FF" font-family="Consolas, monospace" font-size="18">Important Files</text>
    <text x="126" y="555" fill="#D9E6FF" font-family="Consolas, monospace" font-size="18">- README.md</text>
    <text x="126" y="585" fill="#D9E6FF" font-family="Consolas, monospace" font-size="18">- package.json</text>
    <text x="126" y="615" fill="#D9E6FF" font-family="Consolas, monospace" font-size="18">- tsconfig.json</text>
    <text x="126" y="645" fill="#D9E6FF" font-family="Consolas, monospace" font-size="18">- src/cli/index.ts</text>
    <text x="126" y="675" fill="#D9E6FF" font-family="Consolas, monospace" font-size="18">- src/core/build.ts</text>
  </g>

  <g>
    <text x="800" y="220" fill="#F7FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="78" font-weight="800">RepoPack</text>
    <text x="800" y="290" fill="#A8BCD8" font-family="Segoe UI, Arial, sans-serif" font-size="34">Turn any codebase into a clean, token-budgeted,</text>
    <text x="800" y="332" fill="#A8BCD8" font-family="Segoe UI, Arial, sans-serif" font-size="34">agent-ready context pack.</text>

    <rect x="800" y="390" width="290" height="56" rx="16" fill="url(#accent)"/>
    <text x="835" y="426" fill="#09111F" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Context compiler for AI coding</text>

    <text x="800" y="510" fill="#D9E6FF" font-family="Segoe UI, Arial, sans-serif" font-size="28">Not a repo dump.</text>
    <text x="800" y="550" fill="#D9E6FF" font-family="Segoe UI, Arial, sans-serif" font-size="28">Not a chat wrapper.</text>
    <text x="800" y="590" fill="#D9E6FF" font-family="Segoe UI, Arial, sans-serif" font-size="28">A clean context pack for Codex, Claude Code, Cursor.</text>

    <text x="800" y="700" fill="#8FA6C7" font-family="Segoe UI, Arial, sans-serif" font-size="22">Markdown output • JSON repo map • Presets • Token budget</text>
  </g>
</svg>